name: Create release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the tagged revision
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: python3 -m pip install -r requirements-build.txt

      - name: Build release archive
        shell: bash
        run: |
          test -f "updates/$GITHUB_REF_NAME.txt"
          python3 bundle.py "$GITHUB_REF_NAME"
          cd "build/$GITHUB_REF_NAME"
          zip -r "$GITHUB_WORKSPACE/material-osc.zip" \
            fonts scripts

      - name: Prepare release description
        shell: bash
        run: |
          cp INSTALLATION.md release-body.md
          printf '\n\n## What’s new\n\n' >> release-body.md
          cat "updates/$GITHUB_REF_NAME.txt" >> release-body.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          generate_release_notes: true
          files: material-osc.zip
