name: Create release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the tagged revision
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: python3 -m pip install -r requirements-build.txt

      - name: Build release archive
        shell: bash
        run: |
          python3 bundle.py "$GITHUB_REF_NAME"
          cd "build/$GITHUB_REF_NAME"
          zip -r "$GITHUB_WORKSPACE/material-osc-$GITHUB_REF_NAME.zip" \
            material-osc.lua material-osc

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: INSTALLATION.md
          generate_release_notes: true
          files: material-osc-${{ github.ref_name }}.zip
