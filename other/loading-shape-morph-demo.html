<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Shape Morph Demo</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #1c1c1c;
            --shape: #4f3b78;
            --container: #c8b6ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            font-family: system-ui, sans-serif;
        }

        main {
            display: grid;
            gap: 16px;
            justify-items: center;
        }

        .shape-frame {
            width: min(440px, 82vw);
            aspect-ratio: 1;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: var(--container);
        }

        canvas {
            width: 82%;
            height: 82%;
            display: block;
        }
    </style>
</head>
<body>
    <main>
        <div class="shape-frame">
            <canvas id="shapeCanvas" width="640" height="640"></canvas>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('shapeCanvas');
        const ctx = canvas.getContext('2d');
        const STEP_MS = 650;
        const FULL_ROTATION_MS = 4666;
        const QUARTER_ROTATION = 90;
        const TOTAL_POINTS = 240;
        const RADIUS_BASE = canvas.width / 2;
        const CENTER = canvas.width / 2;
        const startTime = performance.now();
        const lerp = (a, b, t) => a + (b - a) * t;
        const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
        const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
        const norm = (x, y, fallback = { x: 1, y: 0 }) => {
            const len = Math.hypot(x, y);
            return len < 1e-6 ? fallback : { x: x / len, y: y / len };
        };

        const sequence = [
            [10, 0.85, 0.67, 0.75, 0.5],
            [9, 0.85, 0.755, 0.8, 0.5],
            [5, 0.85, 0.731, 0.45, 1],
            [2, 0.85, 0.67, 0.8, 0.95],
            [8, 0.85, 0.731, 0.6, 0.45],
            [4, 0.875, 0.635, 1, 0.4],
            [2, 0.85, 0.535, 0.8, 0.6]
        ].map(([points, outerRadius, innerRadius, outerRoundness, innerRoundness]) => ({
            points,
            outerRadius,
            innerRadius,
            outerRoundness,
            innerRoundness
        }));

        function springProgress(ms) {
            const t = ms / 1000;
            const stiffness = 200;
            const damping = 0.6;
            const omega0 = Math.sqrt(stiffness);
            const omegaD = omega0 * Math.sqrt(1 - damping * damping);
            const displacement = Math.exp(-damping * omega0 * t) *
                (-Math.cos(omegaD * t) - damping * omega0 / omegaD * Math.sin(omegaD * t));

            return clamp(1 + displacement, 0, 1);
        }

        function scalePulse(ms) {
            const t = ms / STEP_MS;
            const smooth = (p) => p * p * (3 - 2 * p);
            const outCubic = (p) => 1 - (1 - p) ** 3;
            const segments = [
                [0, 0.14, 1, 0.985, smooth],
                [0.14, 0.46, 0.985, 1.04, outCubic],
                [0.46, 0.76, 1.04, 1, smooth]
            ];
            const segment = segments.find(([start, end]) => t < end && t >= start);

            if (!segment) return 1;

            const [start, end, from, to, ease] = segment;
            return lerp(from, to, ease((t - start) / (end - start)));
        }

        function starGeometry(shape) {
            const points = Math.max(2, Math.floor(shape.points));
            const count = points * 2;
            const anchors = Array.from({ length: count }, (_, i) => {
                const outer = i % 2 === 0;
                const radius = (outer ? shape.outerRadius : shape.innerRadius) * RADIUS_BASE;
                const angle = i * Math.PI / points;
                return { x: CENTER + Math.cos(angle) * radius, y: CENTER + Math.sin(angle) * radius, outer };
            });
            const tangents = anchors.map((_, i) => {
                const prev = anchors[(i - 1 + count) % count];
                const next = anchors[(i + 1) % count];
                return norm(next.x - prev.x, next.y - prev.y);
            });
            const lengths = anchors.map((anchor, i) => {
                const prev = anchors[(i - 1 + count) % count];
                const next = anchors[(i + 1) % count];
                const roundness = anchor.outer ? shape.outerRoundness : shape.innerRoundness;
                return Math.max(0, roundness) * Math.min(dist(anchor, prev), dist(anchor, next)) * 0.5;
            });
            const handles = anchors.map((anchor, i) => {
                const prev = tangents[(i - 1 + count) % count];
                const next = tangents[(i + 1) % count];
                const tangent = tangents[i];
                const length = lengths[i];

                return {
                    in: { x: anchor.x - tangent.x * length, y: anchor.y - tangent.y * length },
                    out: { x: anchor.x + tangent.x * length, y: anchor.y + tangent.y * length }
                };
            });

            return { anchors, handles };
        }

        function cubic(p0, c1, c2, p1, t) {
            const inv = 1 - t;
            return {
                x: inv ** 3 * p0.x + 3 * inv * inv * t * c1.x + 3 * inv * t * t * c2.x + t ** 3 * p1.x,
                y: inv ** 3 * p0.y + 3 * inv * inv * t * c1.y + 3 * inv * t * t * c2.y + t ** 3 * p1.y
            };
        }

        function resample(points) {
            const lengths = points.map((point, i) => dist(point, points[(i + 1) % points.length]));
            const perimeter = lengths.reduce((sum, length) => sum + length, 0);
            const sampled = [];
            let edge = 0;
            let consumed = 0;

            for (let i = 0; i < TOTAL_POINTS; i++) {
                const target = perimeter * i / TOTAL_POINTS;

                while (consumed + lengths[edge] < target && edge < lengths.length - 1) {
                    consumed += lengths[edge++];
                }

                const point = points[edge];
                const next = points[(edge + 1) % points.length];
                const t = (target - consumed) / (lengths[edge] || 1);
                sampled.push({ x: lerp(point.x, next.x, t), y: lerp(point.y, next.y, t) });
            }

            return sampled;
        }

        function sampleShape(shape) {
            const { anchors, handles } = starGeometry(shape);
            const dense = [];

            anchors.forEach((anchor, i) => {
                const next = (i + 1) % anchors.length;

                for (let step = 0; step < 18; step++) {
                    dense.push(cubic(anchor, handles[i].out, handles[next].in, anchors[next], step / 18));
                }
            });

            return { points: resample(dense) };
        }

        function shifted(points, offset) {
            return points.map((_, i) => points[(i + offset) % points.length]);
        }

        function alignTo(from, to) {
            let bestOffset = 0;
            let bestScore = Infinity;

            for (let offset = 0; offset < to.points.length; offset++) {
                let score = 0;

                for (let i = 0; i < from.points.length; i += 4) {
                    const point = to.points[(i + offset) % to.points.length];
                    score += (from.points[i].x - point.x) ** 2 + (from.points[i].y - point.y) ** 2;
                }

                if (score < bestScore) {
                    bestScore = score;
                    bestOffset = offset;
                }
            }

            return { ...to, points: shifted(to.points, bestOffset) };
        }

        const sampledSequence = sequence.map(sampleShape).reduce((aligned, shape) => {
            aligned.push(aligned.length ? alignTo(aligned.at(-1), shape) : shape);
            return aligned;
        }, []);

        function draw(from, to, progress, rotation, scale) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(CENTER, CENTER);
            ctx.scale(scale, scale);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.translate(-CENTER, -CENTER);
            ctx.beginPath();

            from.points.forEach((point, i) => {
                const next = to.points[i];
                const x = lerp(point.x, next.x, progress);
                const y = lerp(point.y, next.y, progress);

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });

            ctx.closePath();
            ctx.fillStyle = '#4f3b78';
            ctx.fill();
            ctx.restore();
        }

        function animate(now) {
            const elapsed = now - startTime;
            const step = Math.floor(elapsed / STEP_MS);
            const morphElapsed = elapsed % STEP_MS;
            const progress = springProgress(morphElapsed);
            const from = sampledSequence[step % sampledSequence.length];
            const to = sampledSequence[(step + 1) % sampledSequence.length];
            const stepRotation = step * QUARTER_ROTATION + progress * QUARTER_ROTATION;
            const globalRotation = (elapsed % FULL_ROTATION_MS) / FULL_ROTATION_MS * 360;

            draw(from, to, progress, stepRotation + globalRotation, scalePulse(morphElapsed));
            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
